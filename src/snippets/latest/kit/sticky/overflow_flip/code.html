<div class="z-position-relative z-position-z-index-zero">
  <div
    class="z-position-z-index-negative display-flex h items-center justify-center bg color text-center"
    style="--h: 80; --bg: var(--z-primary); --color: var(--z-primary-f)"
    data-z-sticky="overflow-flip: true; end: 100%; offset: 80"
  >
    overflow-flip: true<br />
    end: 100%
  </div>
  <div
    class="z-position-z-index-negative display-flex h items-center justify-center bg/o color text-center"
    style="
      --h: 80;
      --bg: var(--z-muted);
      --bg-o: var(--z-muted-o);
      --color: var(--z-muted-f);
    "
  >
    Cover previous section.<br />Reveal next section.
  </div>
  <div
    class="z-position-z-index-negative display-flex h items-center justify-center bg color text-center"
    style="--h: 80; --bg: var(--z-primary); --color: var(--z-primary-f)"
    data-z-sticky="position: bottom; overflow-flip: true; start: -100%; end: 0"
  >
    position: bottom<br />
    overflow-flip: true<br />
    start: -100%<br />
    end: 0
  </div>
</div>
