<!-- Unstyled -->
<div class="[h]" style="--h: calc(var(--z-global-font-size) * 2.5)">
  <z-input-date></z-input-date>
</div>

<!-- Custom -->
<div class="[h]" style="--h: calc(var(--z-global-font-size) * 2.5)">
  <z-input-date
    cls="button: bg-lime-500 text-lime-50 w-full flex justify-between; icon: bg-orange-500 text-orange-50; dropdown: bg-purple-500 text-purple-50; calendar: bg-cyan-900 text-cyan-50; time: bg-emerald-500 text-emerald-900"
    icon="calendar"
    with-time
  >
  </z-input-date>
</div>
