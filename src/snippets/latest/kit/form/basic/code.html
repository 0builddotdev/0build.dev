<form>
  <fieldset class="z-fieldset space-y" style="--space-y: 4">
    <div class="">
      <input
        class="z-input"
        type="text"
        placeholder="Input"
        aria-label="Input"
      />
    </div>

    <div class="">
      <select class="z-select" aria-label="Select">
        <option>Option 01</option>
        <option>Option 02</option>
      </select>
    </div>

    <div class="">
      <textarea
        class="z-textarea"
        rows="5"
        placeholder="Textarea"
        aria-label="Textarea"
      ></textarea>
    </div>

    <div class="">
      <label class="mr" style="--mr: 2">
        <input
          class="z-radio mr"
          style="--mr: 1"
          type="radio"
          name="radio2"
          checked
        />
        Option 1
      </label>
      <label>
        <input class="z-radio mr" style="--mr: 1" type="radio" name="radio2" />
        Option 2
      </label>
    </div>

    <div class="">
      <label class="mr" style="--mr: 2">
        <input class="z-checkbox mr" style="--mr: 1" type="checkbox" checked />
        Option 1
      </label>
      <label
        ><input class="z-checkbox mr" style="--mr: 1" type="checkbox" /> Option
        2</label
      >
    </div>

    <div class="">
      <input
        class="z-range"
        type="range"
        value="2"
        min="0"
        max="10"
        step="0.1"
        aria-label="Range"
      />
    </div>
  </fieldset>
</form>
